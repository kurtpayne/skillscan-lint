# SkillScan/PassiveVoice.yml
# Mirrors skillscan-lint rule QL-003
# Passive voice reduces clarity in skill descriptions.
# Vale's built-in passive voice detection covers most cases; this rule
# adds skill-file-specific patterns.
extends: existence
message: "Possible passive voice detected: '%s'. Rewrite using active voice."
link: https://github.com/kurtpayne/skillscan-lint#ql-003
level: suggestion
ignorecase: true
tokens:
  - is handled by
  - is processed by
  - is managed by
  - is returned by
  - is called by
  - is executed by
  - is triggered by
  - is generated by
  - is created by
  - is updated by
  - is deleted by
  - is fetched by
  - is parsed by
  - is validated by
  - is transformed by
  - is stored by
  - is sent by
  - is received by
  - is invoked by
