# .vale.ini — Vale prose linter configuration for skillscan-lint
#
# Mirrors the QL-rule set so editors (VS Code Vale extension, CI) surface
# the same quality signals as `skillscan-lint` itself.
#
# Usage:
#   vale sync          # download base styles (Vale-compatible packages)
#   vale <file.md>     # lint a single skill file
#   vale .             # lint all Markdown/YAML files in the current directory
#
# Install Vale:
#   brew install vale                  # macOS
#   choco install vale                 # Windows
#   sudo snap install vale             # Linux
#   pip install vale                   # cross-platform (wrapper)
#
# VS Code extension: "Vale VSCode" (ID: chrischinchilla.vale-vscode)

StylesPath = vale/styles
MinAlertLevel = suggestion

[formats]
yaml = md

[*.md]
BasedOnStyles = SkillScan

[*.yaml]
BasedOnStyles = SkillScan

[*.yml]
BasedOnStyles = SkillScan
