# skill-schema.yaml
# Canonical schema definition for SkillScan skill files (SKILL.md / CLAUDE.md).
#
# This file is the single source of truth for:
#   - Valid frontmatter keys (used by both skillscan-security PSV-004 and skillscan-lint QL-026)
#   - High-risk injection key names (used by skillscan-security PSV-004 severity escalation)
#   - Tool risk tiers (used by skillscan-security GR-007 / PSV-003 and skillscan-lint QL-029/030)
#   - Graph edge keys (frontmatter keys that declare skill-to-skill invocations)
#
# Both skillscan-security and skillscan-lint read this file at import time.
# skillscan-lint uses skillscan-security's installed copy when available (importlib.resources),
# falling back to its own bundled copy for standalone installs.
#
# To add a new frontmatter key: add it here. Both packages pick it up on next install.
# Schema version is bumped whenever keys are added or removed.

schema_version: "1.0"

# ---------------------------------------------------------------------------
# Standard frontmatter keys
# Keys in this list are considered part of the official skill schema.
# Unknown keys not in this list trigger PSV-004 (security) and QL-026 (lint).
# ---------------------------------------------------------------------------
standard_frontmatter_keys:
  # Identity
  - name
  - version
  - description
  - author
  - license
  # Capability declarations
  - allowed-tools
  - allowed_tools
  - tools
  - capabilities
  # Classification
  - tags
  - category
  - categories
  # Documentation
  - examples
  - usage
  - notes
  - changelog
  - updated
  # Compatibility
  - compatibility
  - prerequisites
  - requires
  # Sub-skill references (also covered by graph_edge_keys below)
  - skills
  - sub-skills
  - sub_skills
  # Context / memory
  - context

# ---------------------------------------------------------------------------
# High-risk unknown keys
# Unknown frontmatter keys matching these names escalate PSV-004 to HIGH severity.
# These are known injection vectors that some agent runtimes interpret as
# privileged configuration.
# ---------------------------------------------------------------------------
high_risk_unknown_keys:
  - system_override
  - system_prompt
  - behavior
  - activation
  - override
  - inject
  - hidden
  - secret
  - confidential
  - instructions
  - prompt
  - jailbreak
  - bypass

# ---------------------------------------------------------------------------
# Graph edge keys
# Frontmatter keys that declare skill-to-skill invocation edges.
# Used by both the security skill graph (PSV-001/002, GR-007) and the
# lint graph detector (GR-001 through GR-006).
# ---------------------------------------------------------------------------
graph_edge_keys:
  - skills
  - sub-skills
  - sub_skills
  - invoke
  - calls
  - depends_on
  - uses
  - requires

# ---------------------------------------------------------------------------
# Tool risk tiers
# Used by skillscan-security (GR-007 tool escalation, PSV-003 permission scope)
# and skillscan-lint (QL-029 undeclared capability, QL-030 high-risk tool warning).
#
# Tiers:
#   3 = high   — code execution or full computer control
#   2 = medium — network access or arbitrary file write
#   1 = low    — read-only or scoped operations
# ---------------------------------------------------------------------------
tool_risk_tiers:
  high:  # tier 3
    - bash
    - computer
    - computer_use
    - shell
    - terminal
    - execute_code
    - run_code
    - code_execution
    - exec
  medium:  # tier 2
    - webfetch
    - web_fetch
    - url_fetch
    - http_get
    - fetch
    - curl
    - wget
    - write
    - write_file
    - file_write
    - create_file
  low:  # tier 1
    - read
    - read_file
    - list_files
    - search
    - grep
